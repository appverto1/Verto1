name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Claude Code Review
        uses: anthropics/claude-github-connector@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
